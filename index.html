<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر A1PLUS | نظام طلبات PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #ffcc00; --bg: #000; --card: #121212; --white: #fff; }
        body { background-color: var(--bg); color: var(--white); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 120px; }
        header { text-align: center; padding: 20px; border-bottom: 1px solid #333; }
        .logo { width: 70px; height: 70px; border: 2px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 24px; font-weight: bold; color: var(--primary); }
        
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #222; width: 280px; }
        
        .img-box { background: #fff; height: 180px; border-radius: 8px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; }
        .img-box img { max-width: 90%; max-height: 90%; object-fit: contain; }

        .qty-box { display: flex; justify-content: center; align-items: center; gap: 15px; background: #1a1a1a; border: 1px solid var(--primary); padding: 5px; border-radius: 8px; width: fit-content; margin: 10px auto; }
        .q-btn { background: none; border: none; color: var(--primary); font-size: 22px; cursor: pointer; width: 35px; font-weight: bold; }
        .q-val { font-size: 18px; font-weight: bold; }

        select { background: #222; color: #fff; border: 1px solid var(--primary); padding: 8px; border-radius: 5px; width: 100%; margin-bottom: 10px; }
        .add-btn { background: var(--primary); color: #000; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* شريط السلة */
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; border-top: 3px solid var(--primary); padding: 15px; display: none; justify-content: space-around; align-items: center; z-index: 1000; }
        .btn-pdf { background: #e74c3c; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-wa { background: #25d366; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* قالب PDF مخفي */
        #invoice-template { display: none; padding: 40px; color: #000; background: #fff; }
    </style>
</head>
<body>

<header>
    <div class="logo">A1</div>
    <h1>A1PLUS</h1>
    <p>معدات السلامة المهنية</p>
</header>

<div class="container">
    <div class="card">
        <div class="img-box"><img src="vest-007.png"></div>
        <h3 class="p-name">صدرية سلامة عاكسة 007</h3>
        <select class="p-size">
            <option>M</option><option>L</option><option>XL</option><option>2XL</option><option>3XL</option><option>4XL</option><option>5XL</option>
        </select>
        <div class="qty-box">
            <button class="q-btn" onclick="changeQty(this, 1, 1)">+</button>
            <span class="q-val">1</span>
            <button class="q-btn" onclick="changeQty(this, -1, 1)">-</button>
        </div>
        <button class="add-btn" onclick="addToCart(this)">إضافة للطلبية</button>
    </div>

    <div class="card">
        <div class="img-box"><img src="cotton-gloves.png"></div>
        <h3 class="p-name">قفازات قطنية A1+</h3>
        <div style="height: 50px;"></div>
        <div class="qty-box">
            <button class="q-btn" onclick="changeQty(this, 10, 10)">+</button>
            <span class="q-val">10</span>
            <button class="q-btn" onclick="changeQty(this, -10, 10)">-</button>
        </div>
        <button class="add-btn" onclick="addToCart(this)">إضافة للطلبية</button>
    </div>
</div>

<div class="cart-bar" id="cartBar">
    <button class="btn-pdf" onclick="generatePDF()">تحميل PDF 📄</button>
    <button class="btn-wa" onclick="sendWA()">طلب عبر الواتساب ✅</button>
</div>

<div id="invoice-template">
    <h1 style="text-align: center;">طلب شراء - A1PLUS</h1>
    <p id="inv-date"></p>
    <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
        <thead>
            <tr style="background: #eee;">
                <th style="border: 1px solid #000; padding: 10px;">الصنف</th>
                <th style="border: 1px solid #000; padding: 10px;">المقاس</th>
                <th style="border: 1px solid #000; padding: 10px;">الكمية</th>
            </tr>
        </thead>
        <tbody id="inv-body"></tbody>
    </table>
</div>

<script>
    let cart = [];

    // دالة تحديث الكمية
    function changeQty(btn, val, min) {
        const display = btn.parentElement.querySelector('.q-val');
        let current = parseInt(display.innerText);
        if (current + val >= min) display.innerText = current + val;
    }

    // دالة إضافة للسلة
    function addToCart(btn) {
        const card = btn.closest('.card');
        const name = card.querySelector('.p-name').innerText;
        const qty = card.querySelector('.q-val').innerText;
        const sizeEl = card.querySelector('.p-size');
        const size = sizeEl ? sizeEl.value : "جملة";

        cart.push({ name, size, qty });
        document.getElementById('cartBar').style.display = 'flex';
        
        btn.innerText = "✓ تمت الإضافة";
        btn.style.background = "#44ff44";
        setTimeout(() => {
            btn.innerText = "إضافة للطلبية";
            btn.style.background = "var(--primary)";
        }, 800);
    }

    // دالة PDF
    function generatePDF() {
        const body = document.getElementById('inv-body');
        document.getElementById('inv-date').innerText = "التاريخ: " + new Date().toLocaleDateString('ar-SA');
        body.innerHTML = "";
        cart.forEach(item => {
            body.innerHTML += `<tr>
                <td style="border: 1px solid #000; padding: 10px;">${item.name}</td>
                <td style="border: 1px solid #000; padding: 10px;">${item.size}</td>
                <td style="border: 1px solid #000; padding: 10px;">${item.qty}</td>
            </tr>`;
        });
        const el = document.getElementById('invoice-template');
        el.style.display = 'block';
        html2pdf().from(el).save().then(() => el.style.display = 'none');
    }

    // دالة الواتساب
    function sendWA() {
        let msg = "طلب شراء جديد A1PLUS:\n";
        cart.forEach((item, i) => msg += `${i+1}. ${item.name} | مقاس: ${item.size} | كمية: ${item.qty}\n`);
        window.open(`https://wa.me/966534107070?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
