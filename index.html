<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A1PLUS | نظام عروض الأسعار المطور</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifW5AQKYzhP8PSkrUsKqGUKoX1WDo30swqv7ezVmEj67Vo6CHNxtjwOKspREIAuzvLBU/+EA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <style>
        :root { --primary: #ffcc00; --bg: #000; --card: #121212; --white: #fff; }
        body { background-color: var(--bg); color: var(--white); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 150px; }
        header { text-align: center; padding: 25px; border-bottom: 1px solid #333; }
        .logo { width: 70px; height: 70px; border: 2px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 24px; font-weight: bold; color: var(--primary); }
        
        .input-section { padding: 20px 5%; text-align: center; }
        .input-section input { padding: 15px; width: 85%; max-width: 500px; border-radius: 10px; border: 1px solid var(--primary); background: #1a1a1a; color: #fff; font-size: 16px; text-align: center; }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #222; width: 270px; }
        .img-box { background: #fff; height: 180px; border-radius: 10px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-box img { max-width: 90%; max-height: 90%; object-fit: contain; }

        .qty-box { display: flex; justify-content: center; align-items: center; gap: 15px; background: #1a1a1a; border: 1px solid var(--primary); padding: 5px; border-radius: 8px; width: fit-content; margin: 10px auto; }
        .q-btn { background: none; border: none; color: var(--primary); font-size: 22px; cursor: pointer; width: 35px; font-weight: bold; }
        
        select { background: #222; color: #fff; border: 1px solid var(--primary); padding: 8px; border-radius: 5px; width: 100%; margin-bottom: 10px; }
        .add-btn { background: var(--primary); color: #000; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; border-top: 4px solid var(--primary); padding: 20px; display: none; flex-direction: column; align-items: center; z-index: 1000; }
        .btn-finish { background: #25d366; color: #fff; border: none; padding: 15px 40px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; }

        /* ستايل الفاتورة للـ PDF */
        #official-invoice { display: none; padding: 30px; background: #fff; color: #000; direction: rtl; font-size: 14px; }
        .inv-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .inv-table th { background: #eee; border: 1px solid #000; padding: 10px; }
        .inv-table td { border: 1px solid #ccc; padding: 10px; text-align: center; }
    </style>
</head>
<body>

<header>
    <div class="logo">A1</div>
    <h1>A1PLUS</h1>
    <p>بوابة التوريدات والأسعار</p>
</header>

<div class="input-section">
    <input type="text" id="customerName" placeholder="أدخل اسم العميل أو الشركة">
</div>

<div class="container">
    <div class="card">
        <div class="img-box"><img src="vest-007.png"></div>
        <h3 class="p-name">صدرية سلامة عاكسة 007</h3>
        <select class="p-size">
            <option>M</option><option>L</option><option>XL</option><option>2XL</option><option>3XL</option><option>4XL</option><option>5XL</option>
        </select>
        <div class="qty-box">
            <button class="q-btn" onclick="changeQty(this, 1, 1)">+</button>
            <span class="q-val">1</span>
            <button class="q-btn" onclick="changeQty(this, -1, 1)">-</button>
        </div>
        <button class="add-btn" onclick="addToQuote(this)">إضافة للفاتورة</button>
    </div>

    <div class="card">
        <div class="img-box"><img src="cotton-gloves.png"></div>
        <h3 class="p-name">قفازات قطنية A1+</h3>
        <div style="height: 50px;"></div>
        <div class="qty-box">
            <button class="q-btn" onclick="changeQty(this, 10, 10)">+</button>
            <span class="q-val">10</span>
            <button class="q-btn" onclick="changeQty(this, -10, 10)">-</button>
        </div>
        <button class="add-btn" onclick="addToQuote(this)">إضافة للفاتورة</button>
    </div>
</div>

<div class="footer-bar" id="footerBar">
    <button class="btn-finish" onclick="processOrder()">إصدار عرض سعر (PDF) وواتساب ✅</button>
</div>

<div id="official-invoice">
    <h2 style="text-align: center; border-bottom: 2px solid #000;">عرض سعر رسمي - A1PLUS</h2>
    <p>التاريخ: <span id="pdf-date"></span></p>
    <p>اسم العميل: <span id="pdf-cust"></span></p>
    <table class="inv-table">
        <thead>
            <tr>
                <th>م</th>
                <th>الصنف</th>
                <th>المقاس</th>
                <th>الكمية</th>
            </tr>
        </thead>
        <tbody id="pdf-body"></tbody>
    </table>
    <div style="margin-top: 30px; font-size: 12px;">
        <p>* الأسعار لا تشمل الضريبة.</p>
        <p>* العرض ساري لمدة 10 أيام.</p>
    </div>
</div>

<script>
    let quoteItems = [];

    function changeQty(btn, val, min) {
        const span = btn.parentElement.querySelector('.q-val');
        let current = parseInt(span.textContent);
        if (current + val >= min) span.textContent = current + val;
    }

    function addToQuote(btn) {
        const card = btn.closest('.card');
        const name = card.querySelector('.p-name').innerText;
        const qty = card.querySelector('.q-val').innerText;
        const sizeSelect = card.querySelector('.p-size');
        const size = sizeSelect ? sizeSelect.value : "جملة";

        quoteItems.push({ name, size, qty });
        document.getElementById('footerBar').style.display = 'flex';
        btn.innerText = "✓ تمت الإضافة";
        setTimeout(() => btn.innerText = "إضافة للفاتورة", 700);
    }

    async function processOrder() {
        const customer = document.getElementById('customerName').value || "عميل محترم";
        
        // تعبئة البيانات في القالب
        document.getElementById('pdf-cust').innerText = customer;
        document.getElementById('pdf-date').innerText = new Date().toLocaleDateString('ar-SA');
        const body = document.getElementById('pdf-body');
        body.innerHTML = "";
        quoteItems.forEach((item, i) => {
            body.innerHTML += `<tr><td>${i+1}</td><td>${item.name}</td><td>${item.size}</td><td>${item.qty}</td></tr>`;
        });

        // تشغيل عملية تحويل PDF
        const element = document.getElementById('official-invoice');
        element.style.display = 'block';

        const opt = {
            margin: 10,
            filename: `A1PLUS_Quotation.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        try {
            // محاولة الحفظ
            await html2pdf().from(element).set(opt).save();
            element.style.display = 'none';

            // بعد الحفظ الناجح، نفتح الواتساب
            let msg = `📋 *عرض سعر رسمي - A1PLUS*\nالعميل: ${customer}\n\n*الرجاء مراجعة ملف PDF المحمل.*`;
            window.open(`https://wa.me/966534107070?text=${encodeURIComponent(msg)}`, '_blank');
        } catch (error) {
            alert("حدث خطأ أثناء إصدار PDF. يرجى التأكد من اتصال الإنترنت.");
            console.error(error);
        }
    }
</script>
</body>
</html>
