<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A1PLUS | معرض المنتجات الاحترافي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #ffcc00; --bg: #000; --card: #121212; --white: #fff; }
        body { background-color: var(--bg); color: var(--white); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 150px; }
        header { text-align: center; padding: 25px; border-bottom: 1px solid #333; }
        .logo { width: 70px; height: 70px; border: 2px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 24px; font-weight: bold; color: var(--primary); }
        
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #222; width: 270px; transition: 0.3s; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }

        /* تنسيق معرض الصور */
        .img-box { background: #fff; height: 200px; border-radius: 10px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: zoom-in; position: relative; }
        .img-box img { max-width: 95%; max-height: 95%; object-fit: contain; transition: 0.3s; }
        .img-box:hover img { transform: scale(1.1); }
        .zoom-hint { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.5); color: #fff; font-size: 10px; padding: 2px 5px; border-radius: 3px; }

        /* نافذة التكبير (Lightbox) */
        .lightbox { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; cursor: zoom-out; }
        .lightbox img { max-width: 90%; max-height: 80%; border-radius: 10px; border: 2px solid var(--primary); }
        .close-lb { position: absolute; top: 20px; right: 30px; color: var(--primary); font-size: 40px; font-weight: bold; }

        .qty-box { display: flex; justify-content: center; align-items: center; gap: 15px; background: #1a1a1a; border: 1px solid var(--primary); padding: 5px; border-radius: 8px; width: fit-content; margin: 10px auto; }
        .q-btn { background: none; border: none; color: var(--primary); font-size: 22px; cursor: pointer; width: 35px; }
        select { background: #222; color: #fff; border: 1px solid var(--primary); padding: 8px; border-radius: 5px; width: 100%; margin-bottom: 10px; }
        .add-btn { background: var(--primary); color: #000; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; border-top: 4px solid var(--primary); padding: 20px; display: none; flex-direction: column; align-items: center; z-index: 1000; }
        .btn-finish { background: #25d366; color: #fff; border: none; padding: 15px 40px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; }

        #official-invoice { display: none; padding: 40px; background: #fff; color: #000; direction: rtl; }
    </style>
</head>
<body>

<header>
    <div style="text-align:center; padding: 15px;"><input type="text" id="custName" placeholder="أدخل اسم العميل / المؤسسة" style="padding:10px; width:80%; max-width:400px; border:1px solid #ffcc00; background:#1a1a1a; color:#fff; text-align:center; border-radius:5px;"></div>
    <div class="logo">A1</div>
    <h1>A1PLUS</h1>
    <p>انقر على صورة المنتج لمعاينتها بدقة</p>
</header>

<div class="container">
    <div class="card">
        <div class="img-box" onclick="openLightbox(this)">
            <img src="vest-007.png">
            <span class="zoom-hint">انقر للتكبير 🔍</span>
        </div>
        <h3 class="p-name">صدرية سلامة عاكسة 007</h3>
        <select class="p-size">
            <option>M</option><option>L</option><option>XL</option><option>2XL</option><option>3XL</option><option>4XL</option><option>5XL</option>
        </select>
        <div class="qty-box">
            <button class="q-btn" onclick="changeQty(this, 1, 1)">+</button>
            <span class="q-val">1</span>
            <button class="q-btn" onclick="changeQty(this, -1, 1)">-</button>
        </div>
        <button class="add-btn" onclick="addToQuote(this)">إضافة للفاتورة</button>
    </div>

    <div class="card">
        <div class="img-box" onclick="openLightbox(this)">
            <img src="cotton-gloves.png">
            <span class="zoom-hint">انقر للتكبير 🔍</span>
        </div>
        <h3 class="p-name">قفازات قطنية A1+</h3>
        <div style="height: 48px;"></div>
        <div class="qty-box">
            <button class="q-btn" onclick="changeQty(this, 10, 10)">+</button>
            <span class="q-val">10</span>
            <button class="q-btn" onclick="changeQty(this, -10, 10)">-</button>
        </div>
        <button class="add-btn" onclick="addToQuote(this)">إضافة للفاتورة</button>
    </div>
</div>

<div class="lightbox" id="lightbox" onclick="this.style.display='none'">
    <span class="close-lb">&times;</span>
    <img id="lightbox-img" src="">
</div>

<div class="footer-bar" id="footerBar">
    <button class="btn-finish" onclick="processOrder()">إصدار فاتورة عرض السعر ✅</button>
</div>

<div id="official-invoice">
    </div>

<script>
    let quoteItems = [];

    // وظيفة تكبير الصور
    function openLightbox(box) {
        const imgSrc = box.querySelector('img').src;
        document.getElementById('lightbox-img').src = imgSrc;
        document.getElementById('lightbox').style.display = 'flex';
    }

    function changeQty(btn, val, min) {
        const span = btn.parentElement.querySelector('.q-val');
        let current = parseInt(span.textContent);
        if (current + val >= min) span.textContent = current + val;
    }

    function addToQuote(btn) {
        const card = btn.closest('.card');
        const name = card.querySelector('.p-name').innerText;
        const qty = card.querySelector('.q-val').innerText;
        const size = card.querySelector('.p-size') ? card.querySelector('.p-size').value : "جملة";
        quoteItems.push({ name, size, qty });
        document.getElementById('footerBar').style.display = 'flex';
        btn.innerText = "✓ تمت الإضافة";
        setTimeout(() => btn.innerText = "إضافة للفاتورة", 700);
    }

    // إضافة بقية وظائف الـ PDF والواتساب هنا...
    async function processOrder() {
        // نستخدم نفس كود التصدير السابق
        alert("جاري إصدار فاتورة عرض السعر...");
        // (يمكنك لصق كود JavaScript الخاص بـ PDF والواتساب من الرد السابق هنا)
    }
</script>
</body>
</html>
