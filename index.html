<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر A1PLUS | طلبات الواتساب</title>
    <style>
        :root { --primary: #ffcc00; --bg: #000; --card-bg: #121212; --text-white: #fff; }
        body { background-color: var(--bg); color: var(--text-white); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        header { text-align: center; padding: 30px 20px; }
        .logo-circle { width: 80px; height: 80px; border: 3px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 28px; font-weight: bold; color: var(--primary); }
        .categories-nav { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; }
        .tab-btn { background: #222; color: #fff; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: #000; font-weight: bold; }
        .products-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 0 5%; }
        .product-card { background: var(--card-bg); border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #222; position: relative; }
        .product-image { background: #fff; height: 180px; border-radius: 10px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-image img { max-width: 95%; max-height: 95%; object-fit: contain; }
        
        .quantity-box { display: flex; justify-content: center; align-items: center; gap: 15px; background: #1a1a1a; border: 1px solid var(--primary); padding: 5px 12px; border-radius: 5px; width: fit-content; margin: 10px auto; }
        .q-btn { background: none; border: none; color: var(--primary); font-size: 20px; cursor: pointer; }
        
        /* زر الواتساب الجديد */
        .order-btn { background-color: #25d366; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; }
        .order-btn:hover { background-color: #128c7e; }
        
        .size-selector { margin-bottom: 10px; }
        select { background: #222; color: #fff; border: 1px solid var(--primary); padding: 5px; border-radius: 5px; width: 100%; }
        .force-text { font-size: 11px; margin-top: 5px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-circle">A1</div>
        <h1>A1PLUS</h1>
        <p style="color: #888;">للطلب المباشر: 0534107070</p>
    </header>

    <div class="categories-nav">
        <button class="tab-btn active" onclick="filter('all')">الكل</button>
        <button class="tab-btn" onclick="filter('clothing')">السترات والملابس</button>
        <button class="tab-btn" onclick="filter('gloves')">الأحذية والقفازات</button>
    </div>

    <div class="products-container">
        
        <div class="product-card" data-category="clothing">
            <div class="product-image"><img src="vest-007.png" alt="صدرية"></div>
            <h3 class="product-name">صدرية سلامة عاكسة 007</h3>
            <div class="size-selector">
                <select class="product-size">
                    <option value="M">مقاس: M</option>
                    <option value="L">مقاس: L</option>
                    <option value="XL">مقاس: XL</option>
                    <option value="2XL">مقاس: 2XL</option>
                    <option value="3XL">مقاس: 3XL</option>
                    <option value="4XL">مقاس: 4XL</option>
                    <option value="5XL">مقاس: 5XL</option>
                </select>
            </div>
            <div class="quantity-box">
                <button class="q-btn" onclick="changeQty(this, 1, 1)">+</button>
                <span class="quantity-value">1</span>
                <button class="q-btn" onclick="changeQty(this, -1, 1)">-</button>
            </div>
            <button class="order-btn" onclick="sendOrder(this)">طلب عبر الواتساب</button>
        </div>

                <span class="quantity-value">10</span>
                <button class="q-btn" onclick="changeQty(this, -10, 10)">-</button>
