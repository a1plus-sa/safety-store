<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر A1PLUS | السلامة المهنية</title>
    <style>
        :root { --primary: #ffcc00; --bg: #000; --card-bg: #121212; --text-white: #fff; }
        body { background-color: var(--bg); color: var(--text-white); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        header { text-align: center; padding: 30px 20px; }
        .logo-circle { width: 80px; height: 80px; border: 3px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 28px; font-weight: bold; color: var(--primary); }
        .categories-nav { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; }
        .tab-btn { background: #222; color: #fff; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: #000; font-weight: bold; }
        .products-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; padding: 0 5%; }
        .product-card { background: var(--card-bg); border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #222; }
        .product-image { background: #fff; height: 180px; border-radius: 10px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-image img { max-width: 95%; max-height: 95%; object-fit: contain; }
        
        /* تنسيق اختيار المقاس */
        .size-selector { margin: 10px 0; }
        select { background: #222; color: #fff; border: 1px solid var(--primary); padding: 5px; border-radius: 5px; width: 80%; cursor: pointer; }
        
        .quantity-box { display: flex; justify-content: center; align-items: center; gap: 15px; background: #1a1a1a; border: 1px solid var(--primary); padding: 5px 12px; border-radius: 5px; width: fit-content; margin: 10px auto; }
        .q-btn { background: none; border: none; color: var(--primary); font-size: 20px; cursor: pointer; user-select: none; }
        .force-text { font-size: 11px; margin-top: 5px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-circle">A1</div>
        <h1>A1PLUS</h1>
        <p style="color: #888;">معدات السلامة المهنية</p>
    </header>

    <div class="categories-nav">
        <button class="tab-btn active" onclick="filter('all')">الكل</button>
        <button class="tab-btn" onclick="filter('clothing')">السترات والملابس</button>
        <button class="tab-btn" onclick="filter('gloves')">الأحذية والقفازات</button>
    </div>

    <div class="products-container">
        
        <div class="product-card" data-category="clothing">
            <div class="product-image">
                <img src="vest-007.png" alt="صدرية سلامة">
            </div>
            <h3>صدرية سلامة عاكسة 007</h3>
            
            <div class="size-selector">
                <label>اختر المقاس:</label><br>
                <select>
                    <option>M</option>
                    <option>L</option>
                    <option>XL</option>
                    <option>2XL</option>
                    <option>3XL</option>
                    <option>4XL</option>
                    <option>5XL</option>
                </select>
            </div>

            <div class="quantity-box">
                <button class="q-btn" onclick="changeQty(this, 1, 1)">+</button>
                <span class="quantity-value">1</span>
                <button class="q-btn" onclick="changeQty(this, -1, 1)">-</button>
            </div>
            <p class="force-text" style="color: #44ff44;">البيع بالحبة</p>
        </div>

        <div class="product-card" data-category="gloves">
            <div class="product-image">
                <img src="cotton-gloves.png" alt="قفازات قطنية">
            </div>
            <h3>قفازات قطنية A1+</h3>
            <div style="height: 45px;"></div> <div class="quantity-box">
                <button class="q-btn" onclick="changeQty(this, 10, 10)">+</button>
                <span class="quantity-value">10</span>
                <button class="q-btn" onclick="changeQty(this, -10, 10)">-</button>
            </div>
            <p class="force-text" style="color: #ff4444;">الشد 10 حبة إجباري</p>
        </div>

    </div>

    <script>
        // دالة التحكم في الكمية المطورة
        // val: القيمة المضافة، min: الحد الأدنى
        function changeQty(btn, val, min) {
            const span = btn.parentElement.querySelector('.quantity-value');
            let current = parseInt(span.textContent);
            if (current + val >= min) {
                span.textContent = current + val;
            }
        }

        function filter(category) {
            const cards = document.querySelectorAll('.product-card');
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            cards.forEach(card => {
                card.style.display = (category === 'all' || card.getAttribute('data-category') === category) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
