<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر A1PLUS | طلبات متعددة</title>
    <style>
        :root { --primary: #ffcc00; --bg: #000; --card: #121212; --white: #fff; }
        body { background-color: var(--bg); color: var(--white); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; padding-bottom: 100px; }
        header { text-align: center; padding: 30px; }
        .logo { width: 80px; height: 80px; border: 3px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 28px; font-weight: bold; color: var(--primary); }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 0 5%; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #222; }
        .img-box { background: #fff; height: 180px; border-radius: 10px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-box img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .qty-box { display: flex; justify-content: center; align-items: center; gap: 15px; background: #1a1a1a; border: 1px solid var(--primary); padding: 5px; border-radius: 8px; width: fit-content; margin: 10px auto; }
        .q-btn { background: none; border: none; color: var(--primary); font-size: 22px; cursor: pointer; width: 35px; }
        select { background: #222; color: #fff; border: 1px solid var(--primary); padding: 8px; border-radius: 5px; width: 100%; margin-bottom: 10px; }
        .add-btn { background: var(--primary); color: #000; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* شريط السلة السفلي */
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; border-top: 2px solid var(--primary); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .cart-info { font-size: 14px; }
        .send-all-btn { background: #25d366; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo">A1</div>
    <h1>A1PLUS</h1>
    <p>أضف المنتجات والمقاسات ثم اطلبها دفعة واحدة</p>
</header>

<div class="container">
    <div class="card">
        <div class="img-box"><img src="vest-007.png"></div>
        <h3 class="p-name">صدرية سلامة عاكسة 007</h3>
        <select class="p-size">
            <option value="M">M</option><option value="L">L</option><option value="XL">XL</option>
            <option value="2XL">2XL</option><option value="3XL">3XL</option><option value="4XL">4XL</option><option value="5XL">5XL</option>
        </select>
        <div class="qty-box">
            <button class="q-btn" onclick="modify(this, 1, 1)">+</button>
            <span class="q-val">1</span>
            <button class="q-btn" onclick="modify(this, -1, 1)">-</button>
        </div>
        <button class="add-btn" onclick="addToCart(this)">إضافة للطلبية</button>
    </div>

    <div class="card">
        <div class="img-box"><img src="cotton-gloves.png"></div>
        <h3 class="p-name">قفازات قطنية A1+</h3>
        <div style="height: 48px;"></div>
        <div class="qty-box">
            <button class="q-btn" onclick="modify(this, 10, 10)">+</button>
            <span class="q-val">10</span>
            <button class="q-btn" onclick="modify(this, -10, 10)">-</button>
        </div>
        <button class="add-btn" onclick="addToCart(this)">إضافة للطلبية</button>
    </div>
</div>

<div class="cart-bar" id="cartBar" style="display: none;">
    <div class="cart-info">تم إضافة <span id="cartCount">0</span> أصناف للطلبية</div>
    <button class="send-all-btn" onclick="sendFullOrder()">إرسال الطلبية كاملة عبر واتساب</button>
</div>

<script>
    let cart = [];

    function modify(btn, amount, min) {
        const display = btn.parentElement.querySelector('.q-val');
        let current = parseInt(display.innerText);
        if (current + amount >= min) display.innerText = current + amount;
    }

    function addToCart(btn) {
        const card = btn.closest('.card');
        const name = card.querySelector('.p-name').innerText;
        const qty = card.querySelector('.q-val').innerText;
        const sizeEl = card.querySelector('.p-size');
        const size = sizeEl ? sizeEl.value : "جملة";

        cart.push({ name, size, qty });
        
        // تحديث شريط السلة السفلي
        document.getElementById('cartBar').style.display = 'flex';
        document.getElementById('cartCount').innerText = cart.length;
        
        btn.innerText = "✓ تمت الإضافة";
        setTimeout(() => btn.innerText = "إضافة للطلبية", 1000);
    }

    function sendFullOrder() {
        if (cart.length === 0) return;
        
        let message = "طلب جديد من متجر A1PLUS:\n";
        cart.forEach((item, index) => {
            message += `${index + 1}. ${item.name} | مقاس: ${item.size} | كمية: ${item.qty}\n`;
        });
        
        const url = `https://wa.me/966534107070?text=${encodeURIComponent(message)}`;
        window.open(url, '_blank');
        
        // مسح السلة بعد الطلب
        cart = [];
        document.getElementById('cartBar').style.display = 'none';
    }
</script>
</body>
</html>
