<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر A1PLUS | السلامة المهنية</title>
    <style>
        :root { --primary: #ffcc00; --bg: #000; --card-bg: #121212; --text-white: #fff; }
        body { background-color: var(--bg); color: var(--text-white); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        header { text-align: center; padding: 30px 20px; }
        .logo-circle { width: 80px; height: 80px; border: 3px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 28px; font-weight: bold; color: var(--primary); }
        
        .categories-nav { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; }
        .tab-btn { background: #222; color: #fff; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: #000; font-weight: bold; }

        .products-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 0 5%; }
        .product-card { background: var(--card-bg); border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #222; display: block; }
        
        .product-image { background: #fff; height: 180px; border-radius: 8px; margin-bottom: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .product-image img { width: 100%; height: 100%; object-fit: contain; }

        .quantity-box { display: flex; justify-content: center; align-items: center; gap: 15px; background: #1a1a1a; border: 1px solid var(--primary); padding: 5px 12px; border-radius: 5px; width: fit-content; margin: 10px auto; }
        .q-btn { background: none; border: none; color: var(--primary); font-size: 20px; cursor: pointer; }
        .force-text { color: #ff4444; font-size: 11px; margin-top: 5px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-circle">A1</div>
        <h1>A1PLUS</h1>
        <p style="color: #888;">معدات السلامة المهنية - نظام البيع بالجملة</p>
    </header>

    <div class="categories-nav">
        <button class="tab-btn active" onclick="filter('all')">الكل</button>
        <button class="tab-btn" onclick="filter('gloves')">الاحذيه والقفازات</button>
        <button class="tab-btn" onclick="filter('vests')">السترات والملابس</button>
    </div>

    <div class="products-container" id="grid">
        <div class="product-card" data-type="gloves">
            <div class="product-image">
                <img src="cotton-gloves.png" alt="قفازات قطنية">
            </div>
            <h3>قفازات قطنية A1+</h3>
            <div class="quantity-box">
                <button class="q-btn" onclick="changeQty(this, 10)">+</button>
                <span class="quantity-value">10</span>
                <button class="q-btn" onclick="changeQty(this, -10)">-</button>
            </div>
            <div class="force-text">الشد 10 حبة إجباري</div>
        </div>

        <div class="product-card" data-type="vests">
            <div class="product-image">
                <img src="vest-007.png" alt="صدرية سلامة">
            </div>
            <h3>صدرية سلامة عاكسة 007</h3>
            <p style="font-size: 11px; color: #aaa;">CODE: A1+ CE EN471 007</p>
            <div class="quantity-box">
                <button class="q-btn" onclick="changeQty(this, 10)">+</button>
                <span class="quantity-value">10</span>
                <button class="q-btn" onclick="changeQty(this, -10)">-</button>
            </div>
            <div class="force-text">الشد 10 حبة إجباري</div>
        </div>
    </div>

    <script>
        // وظيفة تغيير الكمية بمضاعفات 10
        function changeQty(btn, val) {
            const span = btn.parentElement.querySelector('.quantity-value');
            let current = parseInt(span.textContent);
            if (current + val >= 10) {
                span.textContent = current + val;
            }
        }

        // وظيفة تصفية المنتجات حسب القسم
        function filter(type) {
            const cards = document.querySelectorAll('.product-card');
            const buttons = document.querySelectorAll('.tab-btn');
            
            buttons.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            cards.forEach(card => {
                if (type === 'all' || card.getAttribute('data-type') === type) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
