<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر A1PLUS | نظام الفواتير</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #ffcc00; --bg: #000; --card: #121212; --white: #fff; }
        body { background-color: var(--bg); color: var(--white); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 120px; }
        header { text-align: center; padding: 30px; border-bottom: 1px solid #333; }
        .logo { width: 80px; height: 80px; border: 3px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 28px; font-weight: bold; color: var(--primary); }
        
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #222; width: 280px; }
        .img-box { background: #fff; height: 180px; border-radius: 10px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-box img { max-width: 90%; max-height: 90%; object-fit: contain; }

        .qty-box { display: flex; justify-content: center; align-items: center; gap: 15px; background: #1a1a1a; border: 1px solid var(--primary); padding: 5px; border-radius: 8px; width: fit-content; margin: 10px auto; }
        .q-btn { background: none; border: none; color: var(--primary); font-size: 22px; cursor: pointer; width: 35px; font-weight: bold; }
        .q-val { font-size: 18px; font-weight: bold; }

        select { background: #222; color: #fff; border: 1px solid var(--primary); padding: 8px; border-radius: 5px; width: 100%; margin-bottom: 10px; }
        .add-btn { background: var(--primary); color: #000; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* شريط السلة */
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; border-top: 3px solid var(--primary); padding: 15px; display: none; justify-content: space-around; align-items: center; z-index: 1000; }
        .btn-pdf { background: #e74c3c; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-wa { background: #25d366; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* تنسيق الفاتورة المخفية للـ PDF */
        #invoice-print { display: none; padding: 50px; background: #fff; color: #000; direction: rtl; }
        .inv-title { text-align: center; font-size: 24px; border-bottom: 2px solid #000; padding-bottom: 10px; }
        .inv-table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        .inv-table th, .inv-table td { border: 1px solid #000; padding: 10px; text-align: center; }
        .inv-table th { background: #f0f0f0; }
    </style>
</head>
<body>

<header>
    <div class="logo">A1</div>
    <h1>A1PLUS</h1>
    <p>فاتورة شراء إلكترونية لمعدات السلامة</p>
</header>

<div class="container">
    <div class="card">
        <div class="img-box"><img src="vest-007.png"></div>
        <h3 class="p-name">صدرية سلامة عاكسة 007</h3>
        <select class="p-size">
            <option>M</option><option>L</option><option>XL</option><option>2XL</option><option>3XL</option><option>4XL</option><option>5XL</option>
        </select>
        <div class="qty-box">
            <button class="q-btn" onclick="changeQty(this, 1, 1)">+</button>
            <span class="q-val">1</span>
            <button class="q-btn" onclick="changeQty(this, -1, 1)">-</button>
        </div>
        <button class="add-btn" onclick="addToCart(this)">إضافة للفاتورة</button>
    </div>

    <div class="card">
        <div class="img-box"><img src="cotton-gloves.png"></div>
        <h3 class="p-name">قفازات قطنية A1+</h3>
        <div style="height: 50px;"></div>
        <div class="qty-box">
            <button class="q-btn" onclick="changeQty(this, 10, 10)">+</button>
            <span class="q-val">10</span>
            <button class="q-btn" onclick="changeQty(this, -10, 10)">-</button>
        </div>
        <button class="add-btn" onclick="addToCart(this)">إضافة للفاتورة</button>
    </div>
</div>

<div class="cart-bar" id="cartBar">
    <button class="btn-pdf" onclick="generateInvoice()">تحميل فاتورة PDF 📄</button>
    <button class="btn-wa" onclick="sendInvoiceWA()">إرسال فاتورة واتساب ✅</button>
</div>

<div id="invoice-print">
    <div class="inv-title">
        <strong>فاتورة طلب شراء - A1PLUS</strong>
    </div>
    <div style="margin-top: 20px;">
        <p>التاريخ: <span id="inv-date"></span></p>
        <p>المتجر: A1PLUS لمعدات السلامة المهنية</p>
    </div>
    <table class="inv-table">
        <thead>
            <tr>
                <th>م</th>
                <th>اسم الصنف</th>
                <th>المقاس</th>
                <th>الكمية</th>
            </tr>
        </thead>
        <tbody id="inv-items"></tbody>
    </table>
    <div style="margin-top: 50px; text-align: center;">
        <p>هذه الفاتورة تم إنشاؤها إلكترونياً من متجر A1PLUS</p>
    </div>
</div>

<script>
    let cart = [];

    function changeQty(btn, val, min) {
        const display = btn.parentElement.querySelector('.q-val');
        let current = parseInt(display.innerText);
        if (current + val >= min) display.innerText = current + val;
    }

    function addToCart(btn) {
        const card = btn.closest('.card');
        const name = card.querySelector('.p-name').innerText;
        const qty = card.querySelector('.q-val').innerText;
        const sizeEl = card.querySelector('.p-size');
        const size = sizeEl ? sizeEl.value : "جملة";

        cart.push({ name, size, qty });
        document.getElementById('cartBar').style.display = 'flex';
        
        btn.innerText = "✓ أضيف للفاتورة";
        btn.style.background = "#44ff44";
        setTimeout(() => {
            btn.innerText = "إضافة للفاتورة";
            btn.style.background = "var(--primary)";
        }, 800);
    }

    function generateInvoice() {
        if (cart.length === 0) return;
        const body = document.getElementById('inv-items');
        document.getElementById('inv-date').innerText = new Date().toLocaleDateString('ar-SA');
        body.innerHTML = "";
        cart.forEach((item, index) => {
            body.innerHTML += `<tr>
                <td>${index + 1}</td>
                <td>${item.name}</td>
                <td>${item.size}</td>
                <td>${item.qty}</td>
            </tr>`;
        });
        
        const element = document.getElementById('invoice-print');
        element.style.display = 'block';
        const opt = { margin: 10, filename: 'Invoice_A1PLUS.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 3 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
        html2pdf().from(element).set(opt).save().then(() => element.style.display = 'none');
    }

    function sendInvoiceWA() {
        if (cart.length === 0) return;
        let invoiceMsg = "📋 *فاتورة طلب شراء - A1PLUS*\n";
        invoiceMsg += "--------------------------------------\n";
        invoiceMsg += `🗓️ التاريخ: ${new Date().toLocaleDateString('ar-SA')}\n`;
        invoiceMsg += "--------------------------------------\n\n";
        
        cart.forEach((item, i) => {
            invoiceMsg += `*${i+1}. ${item.name}*\n`;
            invoiceMsg += `   🔹 المقاس: ${item.size}\n`;
            invoiceMsg += `   🔹 الكمية: ${item.qty}\n`;
            invoiceMsg += "------------------\n";
        });
        
        invoiceMsg += "\n📝 *يرجى مراجعة الفاتورة وتأكيد الطلب.*";
        window.open(`https://wa.me/966534107070?text=${encodeURIComponent(invoiceMsg)}`, '_blank');
    }
</script>
</body>
</html>
