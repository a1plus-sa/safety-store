<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر A1PLUS | خيارات الطلب</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #ffcc00; --bg: #000; --card: #121212; --white: #fff; }
        body { background-color: var(--bg); color: var(--white); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 160px; }
        header { text-align: center; padding: 20px; border-bottom: 1px solid #333; }
        .logo { width: 70px; height: 70px; border: 2px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 24px; font-weight: bold; color: var(--primary); }
        
        .customer-section { padding: 20px 5%; text-align: center; }
        .customer-section input { padding: 12px; width: 90%; max-width: 450px; border-radius: 8px; border: 1px solid var(--primary); background: #1a1a1a; color: #fff; text-align: center; }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 10px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #222; width: 260px; }
        .img-box { background: #fff; height: 170px; border-radius: 8px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-box img { max-width: 90%; max-height: 90%; object-fit: contain; }

        .qty-box { display: flex; justify-content: center; align-items: center; gap: 15px; background: #1a1a1a; border: 1px solid var(--primary); padding: 5px; border-radius: 8px; width: fit-content; margin: 10px auto; }
        .q-btn { background: none; border: none; color: var(--primary); font-size: 22px; cursor: pointer; width: 35px; }
        
        select { background: #222; color: #fff; border: 1px solid var(--primary); padding: 8px; border-radius: 5px; width: 100%; margin-bottom: 10px; }
        .add-btn { background: var(--primary); color: #000; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* شريط التحكم السفلي المزدوج */
        .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; border-top: 3px solid var(--primary); padding: 15px; display: none; flex-direction: column; align-items: center; gap: 12px; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        .action-btns { display: flex; gap: 10px; width: 100%; max-width: 500px; }
        .btn-pdf { background: #e74c3c; color: #fff; border: none; flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-wa { background: #25d366; color: #fff; border: none; flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }

        /* ستايل الفاتورة للـ PDF */
        #quotation-pdf { display: none; padding: 40px; background: #fff; color: #000; direction: rtl; }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .pdf-table th, .pdf-table td { border: 1px solid #000; padding: 10px; text-align: center; }
    </style>
</head>
<body>

<header>
    <div class="logo">A1</div>
    <h1>A1PLUS</h1>
    <p>أدوات السلامة المهنية</p>
</header>

<div class="customer-section">
    <input type="text" id="clientName" placeholder="أدخل اسمك أو اسم المؤسسة">
</div>

<div class="container">
    <div class="card">
        <div class="img-box"><img src="vest-007.png"></div>
        <h3 class="p-name">صدرية سلامة عاكسة 007</h3>
        <select class="p-size">
            <option>M</option><option>L</option><option>XL</option><option>2XL</option><option>3XL</option><option>4XL</option><option>5XL</option>
        </select>
        <div class="qty-box">
            <button class="q-btn" onclick="change(this, 1, 1)">+</button>
            <span class="q-val">1</span>
            <button class="q-btn" onclick="change(this, -1, 1)">-</button>
        </div>
        <button class="add-btn" onclick="addToCart(this)">إضافة للطلب</button>
    </div>

    <div class="card">
        <div class="img-box"><img src="cotton-gloves.png"></div>
        <h3 class="p-name">قفازات قطنية A1+</h3>
        <div style="height: 50px;"></div>
        <div class="qty-box">
            <button class="q-btn" onclick="change(this, 10, 10)">+</button>
            <span class="q-val">10</span>
            <button class="q-btn" onclick="change(this, -10, 10)">-</button>
        </div>
        <button class="add-btn" onclick="addToCart(this)">إضافة للطلب</button>
    </div>
</div>

<div class="footer-bar" id="footerBar">
    <div id="statusText">تم إضافة <span id="count">0</span> أصناف للطلب</div>
    <div class="action-btns">
        <button class="btn-pdf" onclick="downloadPDF()">تحميل عرض السعر (PDF)</button>
        <button class="btn-wa" onclick="sendToWA()">طلب عبر الواتساب</button>
    </div>
</div>

<div id="quotation-pdf">
    <div style="text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px;">
        <h2>A1PLUS لمعدات السلامة</h2>
        <p>عرض سعر رسمي | التاريخ: <span id="pdfDate"></span></p>
    </div>
    <p><strong>موجّه إلى: </strong> <span id="pdfClient"></span></p>
    <table class="pdf-table">
        <thead>
            <tr style="background: #eee;">
                <th>م</th>
                <th>الصنف</th>
                <th>المقاس</th>
                <th>الكمية</th>
            </tr>
        </thead>
        <tbody id="pdfBody"></tbody>
    </table>
    <div style="margin-top: 30px; font-size: 12px;">
        <p>* الأسعار لا تشمل ضريبة القيمة المضافة.</p>
        <p>* العرض ساري لمدة 10 أيام.</p>
    </div>
</div>

<script>
    let items = [];

    function change(btn, val, min) {
        const span = btn.parentElement.querySelector('.q-val');
        let current = parseInt(span.innerText);
        if (current + val >= min) span.innerText = current + val;
    }

    function addToCart(btn) {
        const card = btn.closest('.card');
        const name = card.querySelector('.p-name').innerText;
        const qty = card.querySelector('.q-val').innerText;
        const sizeSelect = card.querySelector('.p-size');
        const size = sizeSelect ? sizeSelect.value : "جملة";

        items.push({ name, size, qty });
        document.getElementById('footerBar').style.display = 'flex';
        document.getElementById('count').innerText = items.length;
        
        btn.innerText = "✓ تمت الإضافة";
        setTimeout(() => btn.innerText = "إضافة للطلب", 700);
    }

    // وظيفة الـ PDF
    function downloadPDF() {
        if (items.length === 0) return;
        const cust = document.getElementById('clientName').value || "عميل محترم";
        document.getElementById('pdfClient').innerText = cust;
        document.getElementById('pdfDate').innerText = new Date().toLocaleDateString('ar-SA');
        
        const body = document.getElementById('pdfBody');
        body.innerHTML = "";
        items.forEach((it, i) => {
            body.innerHTML += `<tr><td>${i+1}</td><td>${it.name}</td><td>${it.size}</td><td>${it.qty}</td></tr>`;
        });

        const el = document.getElementById('quotation-pdf');
        el.style.display = 'block';
        html2pdf().from(el).save().then(() => el.style.display = 'none');
    }

    // وظيفة الواتساب
    function sendToWA() {
        if (items.length === 0) return;
        const cust = document.getElementById('clientName').value || "غير محدد";
        let msg = `📋 *عرض سعر - A1PLUS*\n👤 العميل: ${cust}\n------------------\n`;
        items.forEach((it, i) => {
            msg += `*${i+1}.* ${it.name}\n   المقاس: ${it.size} | الكمية: ${it.qty}\n`;
        });
        window.open(`https://wa.me/966534107070?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
