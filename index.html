<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر A1PLUS | نظام طلبات PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #ffcc00; --bg: #000; --card: #121212; --white: #fff; }
        body { background-color: var(--bg); color: var(--white); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 120px; }
        header { text-align: center; padding: 20px; border-bottom: 1px solid #333; }
        .logo { width: 70px; height: 70px; border: 2px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 24px; font-weight: bold; color: var(--primary); }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px 5%; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #222; }
        .img-box { background: #fff; height: 180px; border-radius: 8px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; }
        .img-box img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .qty-box { display: flex; justify-content: center; align-items: center; gap: 15px; background: #1a1a1a; border: 1px solid var(--primary); padding: 5px; border-radius: 8px; width: fit-content; margin: 10px auto; }
        .q-btn { background: none; border: none; color: var(--primary); font-size: 22px; cursor: pointer; width: 35px; }
        select { background: #222; color: #fff; border: 1px solid var(--primary); padding: 8px; border-radius: 5px; width: 100%; margin-bottom: 10px; }
        .add-btn { background: var(--primary); color: #000; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* شريط السلة السفلي */
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; border-top: 3px solid var(--primary); padding: 15px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .btn-pdf { background: #e74c3c; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-wa { background: #25d366; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* تنسيق الفاتورة (مخفي في الصفحة ويظهر في PDF) */
        #invoice-template { display: none; padding: 40px; color: #000; background: #fff; font-family: 'Arial', sans-serif; }
        .inv-header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 20px; }
        .inv-table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        .inv-table th, .inv-table td { border: 1px solid #ddd; padding: 12px; text-align: right; }
        .inv-table th { background: #f2f2f2; }
    </style>
</head>
